<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrabTax Pro - Dashboard Pemandu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .card { background: white; border-radius: 2rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; }
        .input-style { background: #f1f5f9; border-radius: 1rem; padding: 0.75rem; width: 100%; font-weight: 700; outline: none; border: 2px solid transparent; transition: 0.2s; }
        .input-style:focus { border-color: #10b981; background: white; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-32">

    <header class="p-6 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black tracking-tight">GrabTax <span class="text-emerald-600">Pro</span></h1>
            <p id="todayDate" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1"></p>
        </div>
        <div class="bg-white p-2 rounded-2xl shadow-sm border border-slate-100">
            <i class="fa-solid fa-cloud-check text-emerald-500"></i>
        </div>
    </header>

    <section class="px-6 mb-6">
        <div class="bg-slate-900 rounded-[2.5rem] p-6 text-white relative overflow-hidden shadow-xl">
            <div class="relative z-10">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-bold opacity-60 uppercase">Realiti Poket (Nett)</span>
                    <span id="zoneStatus" class="text-[9px] font-bold bg-red-500 px-2 py-1 rounded-full">ZON RUGI</span>
                </div>
                <div class="flex items-baseline gap-2">
                    <h2 id="totalNet" class="text-4xl font-black">RM 0.00</h2>
                </div>
                <div class="mt-6">
                    <div class="flex justify-between text-[9px] font-bold mb-1 opacity-60 uppercase">
                        <span>Target Susut Nilai Harian</span>
                        <span>RM 24.65</span>
                    </div>
                    <div class="h-2 bg-slate-800 rounded-full overflow-hidden">
                        <div id="progressBar" class="h-full bg-emerald-500 transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="px-6 space-y-4">
        <div class="card p-6">
            <h3 class="text-xs font-black uppercase tracking-widest mb-4 text-slate-400 italic">"Lawan Arus, Simpan Data"</h3>
            
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Pickup</label>
                        <select id="pickUp" class="input-style text-xs">
                            <option>KL Pusat</option><option>Cheras</option><option>Puchong</option><option>Shah Alam</option><option>PJ</option><option>Subang</option><option>Kajang</option><option>Cyberjaya</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Dropoff</label>
                        <select id="dropOff" class="input-style text-xs">
                            <option>KL Pusat</option><option>Cheras</option><option>Puchong</option><option>Shah Alam</option><option>PJ</option><option>Subang</option><option>Kajang</option><option>Cyberjaya</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Gross (RM)</label>
                        <input type="number" id="gross" placeholder="0.00" class="input-style">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Incentive (RM)</label>
                        <input type="number" id="inc" placeholder="0.00" class="input-style text-emerald-600">
                    </div>
                </div>

                <div>
                    <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Jarak (KM)</label>
                    <input type="number" id="km" placeholder="0.0" class="input-style">
                </div>

                <button id="btnSimpan" onclick="calculateAndSync()" class="w-full bg-emerald-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all flex justify-center items-center gap-2">
                    <i class="fa-solid fa-cloud-arrow-up"></i> SIMPAN KE GOOGLE SHEET
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="exportPDF()" class="bg-white p-4 rounded-3xl border border-slate-200 shadow-sm flex items-center justify-center gap-2 font-bold text-[10px] text-slate-600">
                <i class="fa-solid fa-file-pdf text-red-500"></i> PDF REPORT
            </button>
            <button onclick="localStorage.clear(); location.reload();" class="bg-white p-4 rounded-3xl border border-slate-200 shadow-sm flex items-center justify-center gap-2 font-bold text-[10px] text-slate-400">
                <i class="fa-solid fa-rotate"></i> RESET UI
            </button>
        </div>
    </section>

    <script>
        // URL WEB APP KAU DAH SIAP DI SINI!
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxBziW86txYhTKRy0iLvF9NNK-mYtPR0ugbkbJwVEUJ06Ke-ZKEmysSYAzZxvWPH9Z8PA/exec';
        
        let nettToday = 0;
        let logBook = [];

        window.onload = () => {
            document.getElementById('todayDate').innerText = new Date().toLocaleDateString('ms-MY', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            loadData();
        };

        async function calculateAndSync() {
            const btn = document.getElementById('btnSimpan');
            const gross = parseFloat(document.getElementById('gross').value) || 0;
            const inc = parseFloat(document.getElementById('inc').value) || 0;
            const km = parseFloat(document.getElementById('km').value) || 0;
            
            if(gross === 0) return alert("Masukkan nilai tambang!");

            // Kira Untung Real (Tolak 20% Comm, Minyak, Maint, Depo)
            const fuel = km * 0.20;
            const maint = km * 0.10;
            const realProfit = (gross * 0.80) + inc - fuel - maint - 2.46; // 2.46 adalah depo per trip (anggaran 10 trip)

            const data = {
                route: `${document.getElementById('pickUp').value} -> ${document.getElementById('dropOff').value}`,
                gross: gross,
                inc: inc,
                km: km,
                profit: realProfit.toFixed(2)
            };

            // 1. Simpan ke UI/LocalStorage
            nettToday += realProfit;
            logBook.push(data);
            updateUI();
            saveDataLocal();

            // 2. Hantar ke Google Sheets
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> SEDANG SYNC...';
            btn.disabled = true;

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                alert("✅ Berjaya! Data sudah masuk Google Sheet.");
            } catch (error) {
                alert("❌ Gagal Sync tapi data disimpan di phone.");
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> SIMPAN KE GOOGLE SHEET';
                btn.disabled = false;
                clearInputs();
            }
        }

        function updateUI() {
            document.getElementById('totalNet').innerText = `RM ${nettToday.toFixed(2)}`;
            const progress = (nettToday / 24.65) * 100;
            document.getElementById('progressBar').style.width = `${Math.min(progress, 100)}%`;
            if(nettToday >= 24.65) {
                document.getElementById('zoneStatus').innerText = "ZON UNTUNG";
                document.getElementById('zoneStatus').className = "text-[9px] font-bold bg-emerald-500 px-2 py-1 rounded-full";
            }
        }

        function clearInputs() {
            document.getElementById('gross').value = '';
            document.getElementById('inc').value = '';
            document.getElementById('km').value = '';
        }

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Laporan GrabTax Pro - LHDN Ready", 14, 20);
            const tableData = logBook.map(l => [l.route, l.gross, l.inc, l.profit]);
            doc.autoTable({ startY: 30, head: [['Laluan', 'Gross', 'Inc', 'Profit']], body: tableData });
            doc.save('GrabTax_Report.pdf');
        }

        function saveDataLocal() {
            localStorage.setItem('gt_nett', nettToday);
            localStorage.setItem('gt_log', JSON.stringify(logBook));
        }

        function loadData() {
            const n = localStorage.getItem('gt_nett');
            const l = localStorage.getItem('gt_log');
            if(n) nettToday = parseFloat(n);
            if(l) logBook = JSON.parse(l);
            updateUI();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrabTax Pro - Full</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .input-style { background: #f8fafc; border-radius: 12px; padding: 12px; width: 100%; font-weight: 700; border: 1px solid #e2e8f0; outline: none; }
        .nav-btn.active { color: #10b981; border-top: 3px solid #10b981; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-24">

    <header class="p-6 bg-white border-b flex justify-between items-center">
        <h1 class="text-xl font-black text-emerald-600">GrabTax <span class="text-slate-800">Pro</span></h1>
        <div id="statusBadge" class="text-[9px] font-bold bg-slate-200 px-2 py-1 rounded">OFFLINE</div>
    </header>

    <div class="p-4 bg-slate-900 text-white mx-4 mt-4 rounded-2xl shadow-lg">
        <div class="flex justify-between items-center mb-3">
            <div>
                <p class="text-[9px] text-slate-400 font-bold uppercase">Masa Live</p>
                <p id="liveTimer" class="text-xl font-black text-emerald-400">00:00:00</p>
            </div>
            <div class="flex gap-2">
                <button onclick="startShift()" id="btnStart" class="bg-emerald-500 p-2 rounded-lg text-[10px] font-bold">START</button>
                <button onclick="endShift()" id="btnEnd" class="bg-red-500 p-2 rounded-lg text-[10px] font-bold opacity-50" disabled>STOP</button>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-2 border-t border-slate-700 pt-3">
            <div>
                <label class="text-[8px] text-slate-400 font-bold uppercase">Odo Mula</label>
                <input type="number" id="odoStart" placeholder="KM Mula" class="bg-slate-800 text-white text-[10px] p-2 rounded w-full border-none outline-none">
            </div>
            <div>
                <label class="text-[8px] text-slate-400 font-bold uppercase">Odo Tamat</label>
                <input type="number" id="odoEnd" placeholder="KM Habis" class="bg-slate-800 text-white text-[10px] p-2 rounded w-full border-none outline-none">
            </div>
        </div>
    </div>

    <main class="p-4">
        
        <section id="tabJob" class="tab-content active">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <h2 class="text-xs font-black text-slate-400 mb-4 uppercase tracking-widest">Rekod Job Semasa</h2>
                
                <label class="text-[10px] font-bold text-slate-500 ml-1 uppercase">Gross Earnings (RM)</label>
                <input type="number" id="fare" placeholder="0.00" class="input-style text-xl mb-4 text-emerald-600" oninput="kiraNet()">

                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div>
                        <label class="text-[9px] font-bold text-blue-500 ml-1 uppercase">Pick-up Location</label>
                        <input type="text" id="pickupLoc" placeholder="Mula?" class="input-style border-blue-100">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-blue-500 ml-1 uppercase">Drop-off Location</label>
                        <input type="text" id="dropoffLoc" placeholder="Hantar?" class="input-style border-blue-100">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div>
                        <label class="text-[9px] font-bold text-orange-500 ml-1 uppercase">Jarak Pick-up (KM)</label>
                        <input type="number" id="pickupKM" placeholder="0.0" class="input-style border-orange-100" oninput="kiraNet()">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-orange-500 ml-1 uppercase">Jarak Trip (KM)</label>
                        <input type="number" id="tripKM" placeholder="0.0" class="input-style border-orange-100" oninput="kiraNet()">
                    </div>
                </div>

                <div class="bg-slate-50 p-4 rounded-xl mb-4 text-center">
                    <span class="text-[10px] font-bold text-slate-500 uppercase">Total KM (Job): </span>
                    <span id="totalKM" class="text-slate-900 font-bold">0.00 KM</span>
                </div>

                <button onclick="simpanData()" id="btnSimpan" class="w-full bg-emerald-600 text-white p-4 rounded-2xl font-black shadow-lg shadow-emerald-100 active:scale-95 transition">
                    SIMPAN JOB INI
                </button>
            </div>
        </section>

        <section id="tabKos" class="tab-content">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <h2 class="text-xs font-black text-red-500 mb-4 uppercase tracking-widest">Kos & Perbelanjaan</h2>
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div>
                        <label class="text-[9px] font-bold text-slate-500 ml-1 uppercase">Minyak (RM)</label>
                        <input type="number" id="petrolCost" placeholder="0.00" class="input-style border-red-100" oninput="kiraNet()">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-slate-500 ml-1 uppercase">Makan (RM)</label>
                        <input type="number" id="foodCost" placeholder="0.00" class="input-style border-red-100" oninput="kiraNet()">
                    </div>
                </div>
                <div class="border-2 border-dashed border-slate-200 rounded-2xl p-6 text-center bg-slate-50">
                    <span class="text-[10px] font-bold text-slate-400 uppercase">Klik Untuk Scan Resit/SS</span>
                    <input type="file" id="evidenceFile" accept="image/*" class="block w-full text-xs mt-2">
                </div>
            </div>
        </section>

        <section id="tabSummary" class="tab-content">
            <div class="bg-slate-900 p-6 rounded-3xl text-white mb-4">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Untung Bersih (Nett)</p>
                <h3 id="netUntung" class="text-4xl font-black text-emerald-400">RM 0.00</h3>
                <div class="mt-4 pt-4 border-t border-slate-800 flex justify-between text-[10px] font-bold">
                    <span class="text-slate-400 uppercase">RM/KM Sebenar:</span>
                    <span id="ratePerKM" class="text-white">RM 0.00</span>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="generatePDF()" class="bg-white p-4 rounded-2xl font-bold text-[10px] text-slate-600 border flex items-center justify-center gap-2">📄 PDF REPORT</button>
                <button onclick="resetUI()" class="bg-white p-4 rounded-2xl font-bold text-[10px] text-slate-600 border flex items-center justify-center gap-2">🔄 RESET UI</button>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2 max-w-md mx-auto">
        <button onclick="showTab('tabJob')" class="nav-btn active flex flex-col items-center p-2">
            <span class="text-lg">🚗</span>
            <span class="text-[9px] font-black uppercase">Job</span>
        </button>
        <button onclick="showTab('tabKos')" class="nav-btn flex flex-col items-center p-2">
            <span class="text-lg">⛽</span>
            <span class="text-[9px] font-black uppercase">Kos</span>
        </button>
        <button onclick="showTab('tabSummary')" class="nav-btn flex flex-col items-center p-2">
            <span class="text-lg">📊</span>
            <span class="text-[9px] font-black uppercase">Summary</span>
        </button>
    </nav>

    <script>
        let startTime, timerInterval;
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyajT9z6f7u9lTSFLFkZdnY8RKwBJDXBe3vb_oT4DIo9DOoK85uJfN4jvr-4yId6LJ9kw/exec";

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function startShift() {
            startTime = new Date();
            document.getElementById('statusBadge').innerText = "LIVE ONLINE";
            document.getElementById('statusBadge').className = "text-[9px] font-bold bg-emerald-500 text-white px-2 py-1 rounded animate-pulse";
            document.getElementById('btnStart').disabled = true;
            document.getElementById('btnStart').classList.add('opacity-50');
            document.getElementById('btnEnd').disabled = false;
            document.getElementById('btnEnd').classList.remove('opacity-50');
            timerInterval = setInterval(() => {
                let diff = new Date() - startTime;
                let h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                let m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                let s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                document.getElementById('liveTimer').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        function kiraNet() {
            let f = parseFloat(document.getElementById('fare').value) || 0;
            let p = parseFloat(document.getElementById('pickupKM').value) || 0;
            let t = parseFloat(document.getElementById('tripKM').value) || 0;
            let petrol = parseFloat(document.getElementById('petrolCost').value) || 0;
            let makan = parseFloat(document.getElementById('foodCost').value) || 0;
            let totalKM = p + t;
            let nett = f - petrol - makan;
            document.getElementById('totalKM').innerText = totalKM.toFixed(2) + " KM";
            document.getElementById('netUntung').innerText = "RM " + nett.toFixed(2);
            if(totalKM > 0) {
                let rate = f / totalKM;
                document.getElementById('ratePerKM').innerText = "RM " + rate.toFixed(2);
                document.getElementById('ratePerKM').style.color = rate < 0.8 ? "#ef4444" : "#10b981";
            }
        }

        async function simpanData() {
            const btn = document.getElementById('btnSimpan');
            const data = {
                tarikh: new Date().toLocaleString(),
                fare: document.getElementById('fare').value,
                pickupLoc: document.getElementById('pickupLoc').value,
                dropoffLoc: document.getElementById('dropoffLoc').value,
                pickupKM: document.getElementById('pickupKM').value,
                tripKM: document.getElementById('tripKM').value,
                petrol: document.getElementById('petrolCost').value,
                makan: document.getElementById('foodCost').value,
                shiftTime: document.getElementById('liveTimer').innerText,
                odoStart: document.getElementById('odoStart').value,
                odoEnd: document.getElementById('odoEnd').value
            };

            btn.innerText = "MENGHANTAR...";
            btn.disabled = true;

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(data)
                });
                alert("Data Berhasil Disimpan ke Google Sheet!");
                // Clear input trip sahaja, biarkan timer
                document.getElementById('fare').value = "";
                document.getElementById('pickupKM').value = "";
                document.getElementById('tripKM').value = "";
                document.getElementById('pickupLoc').value = "";
                document.getElementById('dropoffLoc').value = "";
            } catch (e) {
                alert("Ralat: " + e.message);
            } finally {
                btn.innerText = "SIMPAN JOB INI";
                btn.disabled = false;
            }
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("GrabTax Pro Trip Report", 10, 10);
            doc.autoTable({
                head: [['Perkara', 'Data']],
                body: [
                    ['Pickup', document.getElementById('pickupLoc').value],
                    ['Dropoff', document.getElementById('dropoffLoc').value],
                    ['Earnings', 'RM ' + document.getElementById('fare').value],
                    ['Total KM', document.getElementById('totalKM').innerText],
                    ['Shift Time', document.getElementById('liveTimer').innerText]
                ],
            });
            doc.save("GrabTax_Report.pdf");
        }

        function resetUI() { if(confirm("Reset semua input?")) location.reload(); }
        function endShift() { if(confirm("Tamat shift?")) resetUI(); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrabTax Pro - Dashboard Pemandu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .card { background: white; border-radius: 2rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; }
        .input-style { background: #f1f5f9; border-radius: 1rem; padding: 0.75rem; width: 100%; font-weight: 700; outline: none; border: 2px solid transparent; transition: 0.3s; }
        .input-style:focus { border-color: #10b981; background: white; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-32">

    <header class="p-6 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-extrabold text-emerald-600">GrabTax <span class="text-slate-800">Pro</span></h1>
            <p id="currentDate" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest"></p>
        </div>
    </header>

    <div class="px-6 mb-4">
        <div class="card p-4 bg-slate-900 text-white">
            <div class="flex justify-between items-center mb-3">
                <span id="statusBadge" class="text-[10px] bg-slate-700 px-3 py-1 rounded-full font-bold">OFFLINE</span>
                <span id="liveTimer" class="text-xl font-black text-emerald-400">00:00:00</span>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="startShift()" id="btnStart" class="bg-emerald-500 hover:bg-emerald-600 p-3 rounded-xl font-bold text-sm transition">MULA SHIFT</button>
                <button onclick="endShift()" id="btnEnd" class="bg-red-500 opacity-50 p-3 rounded-xl font-bold text-sm transition" disabled>TAMAT SHIFT</button>
            </div>
        </div>
    </div>

    <main class="px-6">
        <div class="card p-6">
            <p class="text-center text-[10px] font-bold text-slate-400 mb-6 italic">"REKOD SETIAP KM MINYAK NYAWA KAU"</p>

            <div class="mb-4">
                <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Total Net Earnings (RM)</label>
                <input type="number" id="fare" placeholder="Contoh: 5.50" class="input-style text-2xl text-emerald-600">
            </div>

            <div class="grid grid-cols-2 gap-3 mb-4">
                <div>
                    <label class="text-[9px] font-bold text-slate-400 uppercase ml-1 text-orange-500">Jarak Pick-up (KM)</label>
                    <input type="number" id="pickupKM" placeholder="0.0" class="input-style border-orange-100" oninput="kiraTotal()">
                </div>
                <div>
                    <label class="text-[9px] font-bold text-slate-400 uppercase ml-1 text-blue-500">Jarak Trip (KM)</label>
                    <input type="number" id="tripKM" placeholder="0.0" class="input-style border-blue-100" oninput="kiraTotal()">
                </div>
            </div>

            <div class="bg-slate-50 p-4 rounded-2xl mb-6 border border-slate-100">
                <div class="flex justify-between text-[11px] font-bold mb-1">
                    <span class="text-slate-500">JARAK SEBENAR:</span>
                    <span id="totalKM" class="text-slate-800 text-sm">0.00 KM</span>
                </div>
                <div class="flex justify-between text-[11px] font-bold">
                    <span class="text-slate-500">KADAR SEBENAR (RM/KM):</span>
                    <span id="ratePerKM" class="text-emerald-600 text-sm">RM 0.00</span>
                </div>
            </div>

            <button onclick="simpanData()" class="w-full bg-emerald-600 text-white p-4 rounded-2xl font-extrabold shadow-lg shadow-emerald-200 hover:scale-[1.02] active:scale-95 transition">
                SIMPAN KE GOOGLE SHEET
            </button>
        </div>
    </main>

    <script>
        let startTime, timerInterval;

        // Set Tarikh
        const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('ms-MY', options);

        function startShift() {
            startTime = new Date();
            document.getElementById('statusBadge').innerText = "LIVE ONLINE";
            document.getElementById('statusBadge').classList.replace('bg-slate-700', 'bg-emerald-500');
            document.getElementById('btnStart').disabled = true;
            document.getElementById('btnStart').classList.add('opacity-50');
            document.getElementById('btnEnd').disabled = false;
            document.getElementById('btnEnd').classList.remove('opacity-50');
            
            timerInterval = setInterval(() => {
                let diff = new Date() - startTime;
                let h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                let m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                let s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                document.getElementById('liveTimer').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        function kiraTotal() {
            let p = parseFloat(document.getElementById('pickupKM').value) || 0;
            let t = parseFloat(document.getElementById('tripKM').value) || 0;
            let f = parseFloat(document.getElementById('fare').value) || 0;
            
            let total = p + t;
            document.getElementById('totalKM').innerText = total.toFixed(2) + " KM";
            
            if(total > 0) {
                let rate = f / total;
                document.getElementById('ratePerKM').innerText = "RM " + rate.toFixed(2);
                // Warning kalau RM/KM rendah
                document.getElementById('ratePerKM').style.color = rate < 0.8 ? "#ef4444" : "#059669";
            }
        }

        async function simpanData() {
            const btn = event.target;
            btn.innerText = "SEDANG MENGHANTAR...";
            btn.disabled = true;

            const data = {
                tarikh: new Date().toLocaleString(),
                fare: document.getElementById('fare').value,
                pickupKM: document.getElementById('pickupKM').value,
                tripKM: document.getElementById('tripKM').value,
                totalKM: document.getElementById('totalKM').innerText,
                ratePerKM: document.getElementById('ratePerKM').innerText,
                shiftTime: document.getElementById('liveTimer').innerText
            };

            // GANTIKAN URL DI BAWAH DENGAN WEB APP URL GOOGLE SCRIPT KAU
            const WEB_APP_URL = "URL_GOOGLE_SCRIPT_KAU_DISINI";

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(data)
                });
                alert("Data Berhasil Disimpan!");
                document.getElementById('fare').value = "";
                document.getElementById('pickupKM').value = "";
                document.getElementById('tripKM').value = "";
            } catch (e) {
                alert("Ralat: " + e.message);
            } finally {
                btn.innerText = "SIMPAN KE GOOGLE SHEET";
                btn.disabled = false;
            }
        }

        function endShift() {
            if(confirm("Tamat shift? Data jam live akan di-reset.")) {
                clearInterval(timerInterval);
                location.reload();
            }
        }
    </script>
</body>
</html>
